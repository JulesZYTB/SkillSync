# Launch : docker-compose up --build
# Stop : docker-compose down
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillsync_db
    ports:
      - "3306:3306"

  server:
    build: ./server
    ports:
      - "3310:3310"
    environment:
      APP_PORT: 3310
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: skillsync_db
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://server:3310
    depends_on:
      - server
